<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>React Mastery – Yuri's Curriculum</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #00e5ff;
    --accent2: #ff6b6b;
    --accent3: #a78bfa;
    --text: #e8e8f0;
    --muted: #666680;
    --success: #22c55e;
    --warning: #f59e0b;
    --radius: 12px;
    --font-mono: 'Space Mono', monospace;
    --font-ui: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-ui); overflow-x: hidden; }

/* SCREENS */
.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

/* ── HOME ── */
#home {
background: var(–bg);
padding: 0;
position: relative;
overflow: hidden;
}
.home-grid-bg {
position: absolute; inset: 0;
background-image:
linear-gradient(rgba(0,229,255,.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,229,255,.04) 1px, transparent 1px);
background-size: 40px 40px;
pointer-events: none;
}
.home-content { position: relative; z-index: 1; padding: 60px 24px 40px; display: flex; flex-direction: column; gap: 32px; }
.home-tag {
display: inline-flex; align-items: center; gap: 8px;
background: rgba(0,229,255,.08); border: 1px solid rgba(0,229,255,.2);
color: var(–accent); font-family: var(–font-mono); font-size: 11px;
padding: 6px 12px; border-radius: 100px; width: fit-content;
letter-spacing: .08em;
}
.home-tag::before { content: ‘’; width: 6px; height: 6px; border-radius: 50%; background: var(–accent); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
.home-title { font-size: clamp(36px, 10vw, 52px); font-weight: 800; line-height: 1.05; letter-spacing: -.02em; }
.home-title span { color: var(–accent); }
.home-sub { font-family: var(–font-mono); font-size: 13px; color: var(–muted); line-height: 1.7; }
.home-sub strong { color: var(–text); }

.progress-ring-wrap { display: flex; align-items: center; gap: 20px; background: var(–surface); border: 1px solid var(–border); border-radius: var(–radius); padding: 20px; }
.ring-label { flex: 1; }
.ring-label h3 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.ring-label p { font-family: var(–font-mono); font-size: 11px; color: var(–muted); }
svg.ring { width: 64px; height: 64px; flex-shrink: 0; }

.modules-list { display: flex; flex-direction: column; gap: 10px; }
.module-card {
background: var(–surface); border: 1px solid var(–border);
border-radius: var(–radius); padding: 16px 18px;
display: flex; align-items: center; gap: 14px;
cursor: pointer; transition: all .2s; position: relative; overflow: hidden;
}
.module-card::after {
content: ‘’; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
background: var(–accent); transform: scaleY(0); transition: transform .2s; transform-origin: bottom;
}
.module-card:active { transform: scale(.98); }
.module-card.unlocked:hover::after, .module-card.unlocked:focus::after { transform: scaleY(1); }
.module-card.locked { opacity: .4; cursor: not-allowed; }
.module-card.completed { border-color: rgba(34,197,94,.3); }
.module-card.completed::after { background: var(–success); transform: scaleY(1); }
.module-card.in-progress::after { background: var(–accent); transform: scaleY(1); }
.mod-icon {
width: 44px; height: 44px; border-radius: 10px; background: var(–surface2);
display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
}
.mod-info { flex: 1; min-width: 0; }
.mod-title { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
.mod-meta { font-family: var(–font-mono); font-size: 10px; color: var(–muted); display: flex; gap: 10px; }
.mod-status { font-size: 18px; flex-shrink: 0; }

/* ── MODULE VIEW ── */
#module-view { background: var(–bg); }
.module-header {
padding: 20px 20px 0;
display: flex; align-items: center; gap: 12px;
border-bottom: 1px solid var(–border);
padding-bottom: 16px;
}
.back-btn {
width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(–border);
background: var(–surface); color: var(–text); font-size: 18px;
display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
}
.module-header-info { flex: 1; }
.module-header-info h2 { font-size: 16px; font-weight: 700; }
.module-header-info p { font-family: var(–font-mono); font-size: 10px; color: var(–muted); margin-top: 2px; }
.lesson-progress-bar { height: 2px; background: var(–border); position: relative; }
.lesson-progress-fill { height: 100%; background: var(–accent); transition: width .4s ease; }

.lessons-list { padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.lesson-item {
background: var(–surface); border: 1px solid var(–border); border-radius: 10px;
padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer;
transition: all .2s;
}
.lesson-item:active { transform: scale(.98); }
.lesson-item.locked { opacity: .35; cursor: not-allowed; }
.lesson-item.done { border-color: rgba(34,197,94,.25); }
.lesson-dot {
width: 32px; height: 32px; border-radius: 50%; background: var(–surface2);
display: flex; align-items: center; justify-content: center;
font-family: var(–font-mono); font-size: 11px; color: var(–muted); flex-shrink: 0;
}
.lesson-dot.done { background: rgba(34,197,94,.15); color: var(–success); }
.lesson-dot.active { background: rgba(0,229,255,.12); color: var(–accent); }
.lesson-info h3 { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.lesson-info p { font-family: var(–font-mono); font-size: 10px; color: var(–muted); }
.lesson-type-badge {
margin-left: auto; font-family: var(–font-mono); font-size: 9px; padding: 3px 7px;
border-radius: 100px; border: 1px solid var(–border); color: var(–muted); flex-shrink: 0;
}
.lesson-type-badge.quiz { border-color: rgba(167,139,250,.3); color: var(–accent3); }
.lesson-type-badge.code { border-color: rgba(0,229,255,.3); color: var(–accent); }
.lesson-type-badge.project { border-color: rgba(255,107,107,.3); color: var(–accent2); }
.lesson-type-badge.flash { border-color: rgba(245,158,11,.3); color: var(–warning); }

/* ── LESSON VIEW ── */
#lesson-view { background: var(–bg); }
.lesson-header {
padding: 16px 20px; display: flex; align-items: center; gap: 12px;
border-bottom: 1px solid var(–border); position: sticky; top: 0; z-index: 10; background: var(–bg);
}
.lesson-content { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 20px; }

/* CONTENT BLOCKS */
.content-block { animation: fadeUp .3s ease both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

.block-text { font-size: 14px; line-height: 1.8; color: var(–text); }
.block-text strong { color: var(–accent); font-weight: 700; }
.block-text em { color: var(–accent3); font-style: normal; font-weight: 600; }

.block-code {
background: var(–surface); border: 1px solid var(–border); border-radius: var(–radius);
overflow: hidden;
}
.code-header {
padding: 10px 14px; background: var(–surface2); border-bottom: 1px solid var(–border);
font-family: var(–font-mono); font-size: 10px; color: var(–muted);
display: flex; align-items: center; justify-content: space-between;
}
.code-dots { display: flex; gap: 5px; }
.code-dot { width: 8px; height: 8px; border-radius: 50%; }
pre {
padding: 16px; font-family: var(–font-mono); font-size: 12px; line-height: 1.7;
overflow-x: auto; color: var(–text);
}
.kw { color: #ff79c6; }
.fn { color: #50fa7b; }
.str { color: #f1fa8c; }
.cmt { color: #6272a4; }
.tag { color: #ff79c6; }
.attr { color: #50fa7b; }
.var { color: #8be9fd; }
.num { color: #bd93f9; }

.block-diagram {
background: var(–surface); border: 1px solid var(–border); border-radius: var(–radius);
padding: 20px; text-align: center;
}
.diagram-title { font-family: var(–font-mono); font-size: 10px; color: var(–muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: .1em; }

/* DIAGRAM: React Render Cycle */
.flow-diagram { display: flex; flex-direction: column; align-items: center; gap: 0; }
.flow-node {
background: var(–surface2); border: 1px solid var(–border); border-radius: 8px;
padding: 10px 18px; font-size: 12px; font-weight: 600;
display: flex; align-items: center; gap: 8px; min-width: 160px; justify-content: center;
}
.flow-node.accent { border-color: rgba(0,229,255,.4); color: var(–accent); background: rgba(0,229,255,.06); }
.flow-node.purple { border-color: rgba(167,139,250,.4); color: var(–accent3); background: rgba(167,139,250,.06); }
.flow-node.red { border-color: rgba(255,107,107,.4); color: var(–accent2); background: rgba(255,107,107,.06); }
.flow-node.green { border-color: rgba(34,197,94,.4); color: var(–success); background: rgba(34,197,94,.06); }
.flow-arrow { font-size: 18px; color: var(–muted); margin: 4px 0; }
.flow-label { font-family: var(–font-mono); font-size: 9px; color: var(–muted); margin-top: -2px; margin-bottom: 2px; }

/* QUIZ */
.block-quiz { display: flex; flex-direction: column; gap: 12px; }
.quiz-question {
background: var(–surface); border: 1px solid var(–border); border-radius: var(–radius); padding: 16px;
}
.quiz-q-text { font-size: 14px; line-height: 1.6; margin-bottom: 14px; font-weight: 600; }
.quiz-options { display: flex; flex-direction: column; gap: 8px; }
.quiz-option {
padding: 12px 14px; border-radius: 8px; border: 1px solid var(–border);
background: var(–surface2); font-size: 13px; cursor: pointer; transition: all .15s;
font-family: var(–font-mono); text-align: left; color: var(–text);
display: flex; align-items: flex-start; gap: 10px;
}
.quiz-option:active { transform: scale(.98); }
.quiz-option.selected { border-color: var(–accent); background: rgba(0,229,255,.08); }
.quiz-option.correct { border-color: var(–success); background: rgba(34,197,94,.1); color: var(–success); }
.quiz-option.wrong { border-color: var(–accent2); background: rgba(255,107,107,.1); color: var(–accent2); }
.quiz-option-key {
width: 20px; height: 20px; border-radius: 4px; background: var(–border);
display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; margin-top: 1px;
}
.quiz-feedback {
padding: 12px 14px; border-radius: 8px; font-size: 12px; line-height: 1.6;
font-family: var(–font-mono); display: none;
}
.quiz-feedback.show { display: block; }
.quiz-feedback.correct { background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.2); color: var(–success); }
.quiz-feedback.wrong { background: rgba(255,107,107,.08); border: 1px solid rgba(255,107,107,.2); color: var(–accent2); }

/* FLASHCARD */
.flashcard-wrap { perspective: 1000px; }
.flashcard {
width: 100%; min-height: 180px; position: relative;
transform-style: preserve-3d; transition: transform .5s ease;
cursor: pointer;
}
.flashcard.flipped { transform: rotateY(180deg); }
.flashcard-face {
position: absolute; inset: 0; border-radius: var(–radius);
padding: 24px 20px; display: flex; flex-direction: column;
align-items: center; justify-content: center; text-align: center;
backface-visibility: hidden; -webkit-backface-visibility: hidden;
}
.flashcard-front {
background: var(–surface); border: 1px solid var(–border);
}
.flashcard-back {
background: rgba(0,229,255,.05); border: 1px solid rgba(0,229,255,.25);
transform: rotateY(180deg);
}
.flashcard-hint { font-family: var(–font-mono); font-size: 10px; color: var(–muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .1em; }
.flashcard-text { font-size: 15px; font-weight: 700; line-height: 1.5; }
.flashcard-answer { font-size: 13px; line-height: 1.7; color: var(–text); font-family: var(–font-mono); }
.flashcard-nav { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 12px; }
.fc-btn {
width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(–border);
background: var(–surface); color: var(–text); font-size: 16px; cursor: pointer;
display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.fc-btn:active { transform: scale(.92); }
.fc-count { font-family: var(–font-mono); font-size: 11px; color: var(–muted); }

/* CODE CHALLENGE */
.block-challenge { display: flex; flex-direction: column; gap: 12px; }
.challenge-prompt {
background: var(–surface); border: 1px solid var(–border); border-radius: var(–radius); padding: 16px;
}
.challenge-label {
font-family: var(–font-mono); font-size: 10px; color: var(–accent); text-transform: uppercase;
letter-spacing: .1em; margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
}
.challenge-label::before { content: ‘’; width: 6px; height: 6px; border-radius: 50%; background: var(–accent); }
.challenge-text { font-size: 13px; line-height: 1.7; }
.challenge-textarea {
width: 100%; min-height: 120px; background: var(–surface); border: 1px solid var(–border);
border-radius: var(–radius); padding: 14px; font-family: var(–font-mono); font-size: 12px;
color: var(–text); resize: vertical; outline: none; transition: border-color .15s;
}
.challenge-textarea:focus { border-color: var(–accent); }
.challenge-reveal-btn {
padding: 12px; border-radius: 8px; background: transparent; border: 1px solid var(–accent3);
color: var(–accent3); font-family: var(–font-mono); font-size: 12px; cursor: pointer;
transition: all .15s;
}
.challenge-reveal-btn:active { background: rgba(167,139,250,.1); }
.challenge-solution { display: none; }
.challenge-solution.show { display: block; }

/* BOTTOM NAV LESSON */
.lesson-footer {
padding: 16px 20px; border-top: 1px solid var(–border);
display: flex; gap: 10px; background: var(–bg);
position: sticky; bottom: 0;
}
.btn-secondary {
flex: 1; padding: 14px; border-radius: 10px; border: 1px solid var(–border);
background: var(–surface); color: var(–text); font-family: var(–font-ui); font-size: 14px;
font-weight: 600; cursor: pointer; transition: all .15s;
}
.btn-primary {
flex: 2; padding: 14px; border-radius: 10px; border: none;
background: var(–accent); color: #000; font-family: var(–font-ui); font-size: 14px;
font-weight: 700; cursor: pointer; transition: all .15s;
}
.btn-primary:active { transform: scale(.97); }
.btn-secondary:active { transform: scale(.97); }

/* CELEBRATION */
.confetti-wrap {
position: fixed; inset: 0; pointer-events: none; z-index: 999;
display: flex; align-items: center; justify-content: center;
}
.complete-toast {
background: var(–success); color: #000; padding: 16px 24px; border-radius: 100px;
font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px;
animation: toastIn .4s ease both, toastOut .4s ease 2.5s both;
pointer-events: none;
}
@keyframes toastIn { from { opacity: 0; transform: translateY(20px) scale(.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes toastOut { to { opacity: 0; transform: translateY(-10px) scale(.9); } }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(–border); border-radius: 2px; }

.section-label {
font-family: var(–font-mono); font-size: 10px; color: var(–muted);
text-transform: uppercase; letter-spacing: .12em; padding: 0 16px; margin-top: 8px;
}

.xp-badge {
display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px;
border-radius: 100px; background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.2);
font-family: var(–font-mono); font-size: 10px; color: var(–warning);
}
</style>

</head>

      {

        blocks: [
          { type: 'text', content: 'Props and state are the two core data mechanisms in React. Mixing them up in interviews is a red flag. Lock these in.' },
          { type: 'flashcards', cards: [
            { q: 'What is a prop in React?', a: 'Data passed into a component from its parent. Read-only inside the component — you cannot mutate props directly.' },
            { q: 'What is state in React?', a: 'Data that lives inside a component and can change over time. When state changes, React re-renders the component.' },

// ═══════════════════════════ STATE ═══════════════════════════

const STORAGE_KEY = 'react_curriculum_v1';

function loadProgress() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : { completed: {}, started: {} };
  } catch { return { completed: {}, started: {} }; }
}

function saveProgress(p) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch {}
}

let progress = loadProgress();
let currentModuleId = null;
let currentLessonIndex = 0;
let currentLessonList = [];
let fcIndex = 0;
let fcFlipped = false;

// ═══════════════════════════ SCREENS ═══════════════════════════

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goHome() {
  showScreen('home');
  renderHome();
}

// ═══════════════════════════ HOME ═══════════════════════════

function renderHome() {
  const totalLessons = CURRICULUM.reduce((a,m) => a + m.lessons.length, 0);
  const doneLessons = Object.keys(progress.completed).length;
  const pct = Math.round((doneLessons / totalLessons) * 100);

  document.getElementById('home-progress-text').textContent =
    `${doneLessons} of ${totalLessons} lessons complete`;

  const circle = document.getElementById('ring-circle');
  const circumference = 163.4;
  circle.style.strokeDashoffset = circumference - (pct / 100) * circumference;
  document.getElementById('ring-pct').textContent = pct + '%';

  const list = document.getElementById('modules-list');
  list.innerHTML = '';

  CURRICULUM.forEach((mod, i) => {
    const lessons = mod.lessons;
    const doneMod = lessons.filter(l => progress.completed[l.id]).length;
    const isFirst = i === 0;
    const prevDone = i === 0 || CURRICULUM[i-1].lessons.every(l => progress.completed[l.id]);
    const locked = !isFirst && !prevDone;
    const completed = lessons.every(l => progress.completed[l.id]);
    const inProg = doneMod > 0 && !completed;

    const card = document.createElement('div');
    card.className = `module-card ${locked ? 'locked' : 'unlocked'} ${completed ? 'completed' : ''} ${inProg ? 'in-progress' : ''}`;
    card.innerHTML = `
      <div class="mod-icon">${mod.icon}</div>
      <div class="mod-info">
        <div class="mod-title">${mod.title}</div>
        <div class="mod-meta">
          <span>${lessons.length} lessons</span>
          <span>${doneMod}/${lessons.length} done</span>
        </div>
      </div>
      <div class="mod-status">${completed ? '✅' : locked ? '🔒' : inProg ? '▶️' : '○'}</div>
    `;
    if (!locked) card.onclick = () => openModule(mod.id);
    list.appendChild(card);
  });
}

// ═══════════════════════════ MODULE VIEW ═══════════════════════════

function openModule(modId) {
  currentModuleId = modId;
  const mod = CURRICULUM[modId];
  document.getElementById('mv-title').textContent = mod.title;
  document.getElementById('mv-sub').textContent = mod.sub;

  const totalDone = mod.lessons.filter(l => progress.completed[l.id]).length;
  const pct = mod.lessons.length ? (totalDone / mod.lessons.length) * 100 : 0;
  document.getElementById('mv-progress-bar').style.width = pct + '%';

  const list = document.getElementById('lessons-list');
  list.innerHTML = '';

  const prevMod = modId > 0 ? CURRICULUM[modId - 1] : null;
  const prevDone = !prevMod || prevMod.lessons.every(l => progress.completed[l.id]);

  mod.lessons.forEach((lesson, i) => {
    const done = !!progress.completed[lesson.id];
    const firstLocked = modId > 0 && !prevDone;
    const locked = firstLocked || (i > 0 && !progress.completed[mod.lessons[i-1].id] && !done);
    const isNext = !done && !locked && (i === 0 || progress.completed[mod.lessons[i-1].id]);

    const badgeMap = { quiz: 'quiz', code: 'code', project: 'project', flash: 'flash', concept: 'flash' };
    const labelMap = { quiz: 'quiz', code: 'code', project: 'project', flash: 'cards', concept: 'concept' };

    const item = document.createElement('div');
    item.className = `lesson-item ${done ? 'done' : ''} ${locked ? 'locked' : ''}`;
    item.innerHTML = `
      <div class="lesson-dot ${done ? 'done' : isNext ? 'active' : ''}">
        ${done ? '✓' : String(i + 1).padStart(2,'0')}
      </div>
      <div class="lesson-info">
        <h3>${lesson.title}</h3>
        <p>${lesson.meta}</p>
      </div>
      <span class="lesson-type-badge ${badgeMap[lesson.type]||''}">${labelMap[lesson.type]||lesson.type}</span>
    `;
    if (!locked) item.onclick = () => openLesson(modId, i);
    list.appendChild(item);
  });

  showScreen('module-view');
}

// ═══════════════════════════ LESSON VIEW ═══════════════════════════

function openLesson(modId, lessonIdx) {
  currentModuleId = modId;
  currentLessonIndex = lessonIdx;
  currentLessonList = CURRICULUM[modId].lessons;

  const lesson = currentLessonList[lessonIdx];
  document.getElementById('lv-title').textContent = lesson.title;
  document.getElementById('lv-meta').textContent = lesson.meta;
  document.getElementById('lv-xp').textContent = `+${lesson.xp} XP`;

  document.getElementById('lesson-back-btn').onclick = () => openModule(modId);

  const prevBtn = document.getElementById('lesson-prev-btn');
  const nextBtn = document.getElementById('lesson-next-btn');
  prevBtn.style.display = lessonIdx === 0 ? 'none' : '';
  nextBtn.textContent = lessonIdx === currentLessonList.length - 1 ? 'Complete ✓' : 'Next →';

  renderLessonContent(lesson);
  showScreen('lesson-view');
}

function lessonNav(dir) {
  const lesson = currentLessonList[currentLessonIndex];
  if (dir === 1) {
    // Mark complete
    if (!progress.completed[lesson.id]) {
      progress.completed[lesson.id] = Date.now();
      saveProgress(progress);
      showToast();
    }
    if (currentLessonIndex < currentLessonList.length - 1) {
      openLesson(currentModuleId, currentLessonIndex + 1);
    } else {
      openModule(currentModuleId);
    }
  } else {
    if (currentLessonIndex > 0) {
      openLesson(currentModuleId, currentLessonIndex - 1);
    }
  }
}

function showToast() {
  const wrap = document.getElementById('toast-wrap');
  wrap.style.display = 'flex';
  setTimeout(() => { wrap.style.display = 'none'; }, 3200);
}

// ═══════════════════════════ CONTENT RENDERING ═══════════════════════════

function renderLessonContent(lesson) {
  const container = document.getElementById('lesson-content');
  container.innerHTML = '';
  fcIndex = 0;
  fcFlipped = false;

  lesson.blocks.forEach((block, bi) => {
    const wrap = document.createElement('div');
    wrap.className = 'content-block';
    wrap.style.animationDelay = (bi * 0.06) + 's';
    wrap.innerHTML = renderBlock(block, bi);
    container.appendChild(wrap);
    attachBlockEvents(wrap, block, bi);
  });
}

function renderBlock(block, bi) {
  switch(block.type) {
    case 'text': return `<div class="block-text">${block.content}</div>`;
    case 'code': return renderCode(block);
    case 'quiz': return renderQuiz(block, bi);
    case 'flashcards': return renderFlashcards(block, bi);
    case 'diagram': return renderDiagram(block);
    case 'challenge': return renderChallenge(block, bi);
    default: return '';
  }
}

function renderCode(block) {
  return `<div class="block-code">
    <div class="code-header">
      <div class="code-dots">
        <div class="code-dot" style="background:#ff5f57"></div>
        <div class="code-dot" style="background:#ffbd2e"></div>
        <div class="code-dot" style="background:#28ca41"></div>
      </div>
      <span>${block.label || 'code'}</span>
    </div>
    <pre>${block.code}</pre>

  </div>`;
}

function renderQuiz(block, bi) {
const opts = block.options.map((o, i) => ` <button class="quiz-option" data-idx="${i}" data-bi="${bi}"> <span class="quiz-option-key">${String.fromCharCode(65+i)}</span> ${o} </button>`).join(’’);
return `<div class="block-quiz">
<div class="quiz-question">
<div class="quiz-q-text">${block.question}</div>
<div class="quiz-options">${opts}</div>
</div>
<div class="quiz-feedback" id="qf-${bi}"></div>

  </div>`;
}

function renderFlashcards(block, bi) {
const card = block.cards[0];
return `<div class="block-quiz">
<div class="diagram-title" style="font-family:var(--font-mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">
Flashcards — tap to flip
</div>
<div class="flashcard-wrap">
<div class="flashcard" id="fc-${bi}" onclick="flipCard('${bi}')">
<div class="flashcard-face flashcard-front">
<div class="flashcard-hint">Question</div>
<div class="flashcard-text" id="fcq-${bi}">${card.q}</div>
</div>
<div class="flashcard-face flashcard-back">
<div class="flashcard-hint">Answer</div>
<div class="flashcard-answer" id="fca-${bi}">${card.a}</div>
</div>
</div>
</div>
<div class="flashcard-nav">
<button class="fc-btn" onclick="navCard('${bi}',-1,'${block.cards.map(c=>c.q+'|||'+c.a).join('~~~')}')">←</button>
<span class="fc-count" id="fcc-${bi}">1 / ${block.cards.length}</span>
<button class="fc-btn" onclick="navCard('${bi}',1,'${block.cards.map(c=>c.q+'|||'+c.a).join('~~~')}')">→</button>
</div>

  </div>`;
}

function renderDiagram(block) {
const diagrams = {
‘jsx-compile’: ` <div class="flow-diagram"> <div class="flow-node accent">📝 Your JSX</div> <div class="flow-arrow">↓</div> <div class="flow-label">Babel transforms</div> <div class="flow-node purple">React.createElement()</div> <div class="flow-arrow">↓</div> <div class="flow-label">React builds</div> <div class="flow-node accent">Virtual DOM Tree</div> <div class="flow-arrow">↓</div> <div class="flow-label">React commits</div> <div class="flow-node green">Real DOM</div> </div>`,
‘render-cycle’: ` <div class="flow-diagram"> <div class="flow-node accent">State / Props Change</div> <div class="flow-arrow">↓</div> <div class="flow-node purple">🖥 Render Phase<br/><span style="font-size:10px;font-weight:400">Component fn runs → JSX returned</span></div> <div class="flow-arrow">↓</div> <div class="flow-node" style="font-size:11px">Reconciliation (diffing vDOM)</div> <div class="flow-arrow">↓</div> <div class="flow-node green">🔧 Commit Phase<br/><span style="font-size:10px;font-weight:400">Minimal real DOM updates</span></div> <div class="flow-arrow">↓</div> <div class="flow-node accent">useEffect runs</div> </div>`,
‘use-effect’: ` <div class="flow-diagram"> <div class="flow-node green">Component Mounts</div> <div class="flow-arrow">↓</div> <div class="flow-node accent">useEffect runs</div> <div class="flow-arrow">↓</div> <div class="flow-node purple">Deps change → cleanup runs</div> <div class="flow-arrow">↓</div> <div class="flow-node accent">useEffect runs again</div> <div class="flow-arrow">↓</div> <div class="flow-node red">Component Unmounts → final cleanup</div> </div>`,
‘router’: ` <div class="flow-diagram"> <div class="flow-node accent">User clicks Link</div> <div class="flow-arrow">↓</div> <div class="flow-label">No page reload</div> <div class="flow-node purple">History API pushes new URL</div> <div class="flow-arrow">↓</div> <div class="flow-node" style="font-size:11px">React Router matches path</div> <div class="flow-arrow">↓</div> <div class="flow-node green">New component renders</div> </div>`
};
return `<div class="block-diagram">
<div class="diagram-title">${block.variant.replace(/-/g,’ ’)}</div>
${diagrams[block.variant] || ‘<p>Diagram</p>’}

  </div>`;
}

function renderChallenge(block, bi) {
const promptFormatted = block.prompt.replace(/\n/g, ‘<br/>’);
const inputPart = block.readOnly ? ‘’ : ` <textarea class="challenge-textarea" id="ct-${bi}" placeholder="Type your answer here..."></textarea>`;
return `<div class="block-challenge">
<div class="challenge-prompt">
<div class="challenge-label">Code Challenge</div>
<div class="challenge-text">${promptFormatted}</div>
</div>
${inputPart}
<button class="challenge-reveal-btn" onclick="revealSolution('${bi}')">Reveal Solution</button>
<div class="challenge-solution" id="cs-${bi}">
<div class="block-code">
<div class="code-header">
<div class="code-dots">
<div class="code-dot" style="background:#ff5f57"></div>
<div class="code-dot" style="background:#ffbd2e"></div>
<div class="code-dot" style="background:#28ca41"></div>
</div>
<span>solution</span>
</div>
<pre style="white-space:pre-wrap">${escapeHtml(block.solution)}</pre>
</div>
</div>

  </div>`;
}

function escapeHtml(str) {
return str.replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’);
}

// ═══════════════════════════ INTERACTIONS ═══════════════════════════

function attachBlockEvents(wrap, block, bi) {
if (block.type === ‘quiz’) {
wrap.querySelectorAll(’.quiz-option’).forEach(btn => {
btn.addEventListener(‘click’, () => {
if (wrap.querySelector(’.quiz-option.correct’)) return; // already answered
const idx = parseInt(btn.dataset.idx);
const isCorrect = idx === block.correct;
btn.classList.add(isCorrect ? ‘correct’ : ‘wrong’);
if (!isCorrect) {
wrap.querySelectorAll(’.quiz-option’)[block.correct].classList.add(‘correct’);
}
const fb = document.getElementById(`qf-${bi}`);
fb.textContent = block.feedback;
fb.className = `quiz-feedback show ${isCorrect ? 'correct' : 'wrong'}`;
});
});
}
}

function flipCard(bi) {
const card = document.getElementById(`fc-${bi}`);
fcFlipped = !fcFlipped;
card.classList.toggle(‘flipped’, fcFlipped);
}

const fcState = {};

function navCard(bi, dir, encoded) {
const cards = encoded.split(’~~~’).map(c => { const p = c.split(’|||’); return {q:p[0],a:p[1]}; });
if (!fcState[bi]) fcState[bi] = 0;
fcState[bi] = Math.max(0, Math.min(cards.length - 1, fcState[bi] + dir));
const card = cards[fcState[bi]];
document.getElementById(`fcq-${bi}`).textContent = card.q;
document.getElementById(`fca-${bi}`).textContent = card.a;
document.getElementById(`fcc-${bi}`).textContent = `${fcState[bi]+1} / ${cards.length}`;
// reset flip
const fc = document.getElementById(`fc-${bi}`);
fc.classList.remove(‘flipped’);
fcFlipped = false;
}

function revealSolution(bi) {
const sol = document.getElementById(`cs-${bi}`);
sol.classList.toggle(‘show’);
}

// ═══════════════════════════ INIT ═══════════════════════════

renderHome();
showScreen(‘home’);
</script>
